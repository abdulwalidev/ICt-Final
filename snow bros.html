// ── AUDIO ──────────────────────────────────────
let AC;
function getAC() { return AC || (AC = new (window.AudioContext||window.webkitAudioContext)()); }
function tone(freq, dur, vol=0.07, type='square', delay=0) {
  try {
    const a=getAC(), o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.value=freq;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+dur);
  } catch(e) {}
}
const sfx = {
  shoot:  ()=>{ tone(480,0.07,0.06,'sawtooth'); tone(720,0.08,0.04,'square',0.03); },
  freeze: ()=>{ tone(220,0.22,0.09,'sine'); tone(330,0.18,0.07,'sine',0.06); tone(440,0.14,0.05,'sine',0.12); },
  kick:   ()=>{ tone(360,0.1,0.1,'square'); tone(240,0.08,0.07,'square',0.05); },
  kill:   ()=>{ [523,659,784].forEach((f,i)=>tone(f,0.1,0.09,'square',i*0.06)); },
  jump:   ()=>tone(580,0.14,0.06,'sine'),
  die:    ()=>{ tone(220,0.28,0.1,'sawtooth'); tone(160,0.35,0.08,'sawtooth',0.06); },
  item:   ()=>tone(880,0.12,0.08,'sine'),
  bounce: ()=>tone(300,0.07,0.05,'square'),

// ── UTILITY DRAWING ────────────────────────────
function rr(x,y,w,h,r) {
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath(); ctx.fill();
}

// ── ENTITY CLASSES ─────────────────────────────
class Player {
  constructor() { this.w=PW; this.h=PH; this.spawn(); }
  spawn() {
    this.x=228; this.y=550;
    this.vx=0; this.vy=0;
    this.onGround=false; this.facing=1;
    this.shootCd=0; this.invTimer=80; this.dead=false;
  }
}

const ESPEED = [1.1, 1.55, 0.85];
class Enemy {
  constructor(d) {
    this.x=d.x; this.y=d.y; this.t=d.t;
    this.w=EW; this.h=EH;
    this.spd=ESPEED[d.t];
    this.vx=(Math.random()>0.5?1:-1)*this.spd;
    this.vy=0; this.onGround=false;
    this.snow=0; // 0-3
    this.thawCd=0;
    this.isBall=false;
    this.ballVx=0;
    this.ballLife=0;
    this.kills=0;
    this.dead=false;
    this.wFrame=0; this.wTick=0;
    this.jumpCd=100+Math.floor(Math.random()*200);
    this.flashTick=0;
  }
}

class Shot {
  constructor(x,y,dir) {
    this.x=x; this.y=y; this.vx=dir*7.2; this.vy=-0.25;
    this.w=11; this.h=11; this.dead=false; this.age=0;
    this.trail=[];
  }
}

class Item {
  constructor(x,y,k) {
    this.x=x; this.y=y; this.vy=-5; this.vx=(Math.random()-0.5)*2;
    this.w=16; this.h=16; this.k=k;
    this.onGround=false; this.dead=false;
    this.life=360; this.tick=0;
  }
}

class Particle {
  constructor(x,y,vx,vy,col,life,sz=3) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.col=col; this.life=life; this.max=life; this.sz=sz;
  }
  step() {
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.18; this.vx*=0.97; this.life--;
  }
  get dead() { return this.life<=0; }
}

class Pop {
  constructor(x,y,txt,col='#fff') {
    this.x=x; this.y=y; this.txt=txt; this.col=col;
    this.life=70; this.vy=-0.7;
  }
  step() { this.y+=this.vy; this.life--; }
  get dead() { return this.life<=0; }
}

let clearTick=0, respawnTick=0, combo=0;
let screenShake=0;
let bgStars=[];

function genStars() {
  bgStars=[];
  for(let i=0;i<40;i++) bgStars.push({x:Math.random()*W,y:48+Math.random()*(H-100),r:Math.random()});
}

// ── PHYSICS ────────────────────────────────────
function applyGrav(obj) {
  obj.vy+=GRAV;
  if(obj.vy>MAXFALL) obj.vy=MAXFALL;
}

function moveY(obj) {
  const py=obj.y;
  obj.y+=obj.vy;
  obj.onGround=false;
  for(const p of plats) {
    if(obj.x+obj.w>p.x+2 && obj.x<p.x+p.w-2) {
      if(obj.vy>=0 && py+obj.h<=p.y+3 && obj.y+obj.h>=p.y) {
        obj.y=p.y-obj.h; obj.vy=0; obj.onGround=true;
      }
      if(obj.vy<0 && py>=p.y+p.h-3 && obj.y<=p.y+p.h) {
        obj.y=p.y+p.h; obj.vy=1;
      }
    }
  }
}

function moveX(obj,wrap=true) {
  obj.x+=obj.vx;
  if(wrap) {
    if(obj.x+obj.w<=0) obj.x=W;
    if(obj.x>=W) obj.x=-obj.w;
  } else {
    if(obj.x<0){ obj.x=0; obj.vx=0; }
    if(obj.x+obj.w>W){ obj.x=W-obj.w; obj.vx=0; }
  }
}

function hits(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ── EFFECTS ────────────────────────────────────
function snowBurst(x,y,n=7) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3.5;
    parts.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s-2,
      `hsl(${200+Math.random()*20},70%,${80+Math.random()*15}%)`,
      16+Math.random()*16, 2+Math.random()*2.5));
  }
}
function deathBurst(x,y,col,n=14) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    parts.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s-4.5,
      col, 28+Math.random()*28, 3+Math.random()*3));
  }
}
function sparkBurst(x,y,col,n=8) {
  for(let i=0;i<n;i++) {
    const a=(i/n)*Math.PI*2, s=2.5+Math.random()*3;
    parts.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s-2,
      col, 14+Math.random()*14, 2));
  }
}

// ── ENEMY LOGIC ────────────────────────────────
const ECOL     = ['#ff5533','#22cc55','#884aee'];
const EHATCOL  = ['#aa1a00','#116633','#441188'];
const ESNOWCOL = ['','rgba(190,228,255,0.5)','rgba(160,210,255,0.78)'];
const PTS_TABLE = [100,200,400,800,1600,3200];

function killEnemy(e) {
  if(e.dead) return;
  deathBurst(e.x+e.w/2, e.y+e.h/2, ECOL[e.t]);
  screenShake=6;
  const pts=PTS_TABLE[Math.min(combo,5)];
  combo++;
  score+=pts; if(score>hi) hi=score;
  pops.push(new Pop(e.x+e.w/2, e.y, pts+'', combo>2?'#ff8844':combo>1?'#ffee44':'#fff'));
  if(combo>=2) sfx.chain(); else sfx.kill();
  e.dead=true;
  if(Math.random()<0.55) dropItem(e.x+e.w/2, e.y+e.h/2);
}

function dropItem(x,y) {
  const r=Math.random();
  const k = r<0.04?3 : r<0.28?2 : r<0.58?1 : 0;
  items.push(new Item(x-8,y-8,k));
}

function freezeEnemy(e) {
  e.snow=3; e.isBall=false; e.vx=0; e.vy=Math.min(e.vy,0);
  e.thawCd=380; e.flashTick=0;
  snowBurst(e.x+e.w/2, e.y+e.h/2, 12);
  sfx.freeze();
}

function updateEnemies() {
  for(const e of enemies) {
    if(e.dead) continue;
    e.flashTick++;

    // ── BALL MODE ──
    if(e.isBall) {
      applyGrav(e);
      moveY(e);
      e.x+=e.ballVx;
      if(e.x<=0) { e.x=1; e.ballVx=Math.abs(e.ballVx)+0.3; sfx.bounce(); screenShake=3; }
      if(e.x+e.w>=W) { e.x=W-e.w-1; e.ballVx=-(Math.abs(e.ballVx)+0.3); sfx.bounce(); screenShake=3; }
      e.ballLife--;
      if(e.ballLife<=0 || e.y>H+50) { e.dead=true; continue; }
      // Kill other enemies
      for(const o of enemies) {
        if(o===e||o.dead||o.isBall) continue;
        if(hits(e,o)) { killEnemy(o); e.kills++; sparkBurst(o.x+o.w/2,o.y+o.h/2,'#ffee44',6); }
      }
      continue;
    }

    // ── FULLY FROZEN (waiting to be kicked) ──
    if(e.snow===3) {
      applyGrav(e); moveY(e); e.vx=0;
      e.thawCd--;
      if(e.thawCd<=0) {
        e.snow=2; e.thawCd=220;
        e.vx=(Math.random()>0.5?1:-1)*e.spd;
        snowBurst(e.x+e.w/2,e.y+e.h/2,5);
      }
      continue;
    }

    // ── NORMAL / PARTIALLY FROZEN ──
    e.wTick++;
    if(e.wTick>=7) { e.wTick=0; e.wFrame=1-e.wFrame; }

    if(e.snow>0) {
      e.thawCd--;
      if(e.thawCd<=0) {
        e.snow--;
        e.thawCd = e.snow===1?340:0;
        if(e.snow===0) snowBurst(e.x+e.w/2,e.y+e.h/2,4);
      }
    }

    applyGrav(e);
    e.x+=e.vx*(e.snow>0?0.45:1);
    if(e.x+e.w<=0) e.x=W; if(e.x>=W) e.x=-e.w;
    moveY(e);

    if(e.onGround) {
      e.jumpCd--;
      if(e.jumpCd<=0 && e.snow===0) {
        e.vy=-9.2-Math.random()*2.5;
        e.jumpCd=90+Math.floor(Math.random()*210);
        if(Math.random()<0.45) e.vx=-e.vx;
      }
      if(Math.random()<0.005) e.vx=-e.vx;
    }
  }
  enemies=enemies.filter(e=>!e.dead);
}

// ── PLAYER LOGIC ───────────────────────────────
function updatePlayer() {
  if(player.dead) {
    respawnTick--;
    if(respawnTick<=0 && lives>0) { player.spawn(); }
    return;
  }

  const L=held('ArrowLeft')||held('KeyA');
  const R=held('ArrowRight')||held('KeyD');
  const J=held('ArrowUp')||held('KeyW')||held('Space');
  const S=held('KeyZ')||held('KeyX')||held('ShiftLeft')||held('ShiftRight');

  if(L){ player.vx=-3.6; player.facing=-1; }
  else if(R){ player.vx=3.6; player.facing=1; }
  else { player.vx*=0.7; if(Math.abs(player.vx)<0.1) player.vx=0; }

  if(J && player.onGround) { player.vy=-12.8; sfx.jump(); }

  if(player.shootCd>0) player.shootCd--;
  if(S && player.shootCd===0) {
    const bx = player.facing>0 ? player.x+player.w+2 : player.x-13;
    shots.push(new Shot(bx, player.y+8, player.facing));
    player.shootCd=16;
    sfx.shoot();
  }

  applyGrav(player);
  moveX(player, true);
  moveY(player);

  if(player.invTimer>0) { player.invTimer--; return; }

  for(const e of enemies) {
    if(e.dead) continue;

    // Kick frozen ball
    if(e.snow===3 && e.onGround && !e.isBall && hits(player,e)) {
      e.isBall=true;
      e.ballVx=player.facing*5.8;
      e.ballLife=520; combo=0;
      sfx.kick(); screenShake=4;
      continue;
    }

    if(e.isBall) continue;

    if(hits(player,e)) {
      if(player.vy>0 && player.y+player.h<e.y+e.h*0.55) {
        player.vy=-8;
        if(e.snow>0) {
          e.snow=Math.min(e.snow+1,3);
          e.thawCd=e.snow===1?340:e.snow===2?220:0;
          if(e.snow>=3) freezeEnemy(e);
        }
      } else {
        // Die
        deathBurst(player.x+player.w/2,player.y+player.h/2,'#44aaff',18);
        sfx.die(); screenShake=10;
        player.dead=true; lives--;
        respawnTick=110;
        if(lives<=0) setTimeout(()=>{ state='gameover'; },1900);
        return;
      }
    }
  }
}

// ── SHOT LOGIC ─────────────────────────────────
function updateShots() {
  for(const s of shots) {
    s.trail.unshift({x:s.x,y:s.y});
    if(s.trail.length>5) s.trail.pop();
    s.age++; s.x+=s.vx; s.vy+=0.08; s.y+=s.vy;
    if(s.x<-24||s.x>W+24||s.y>H||s.y<0||s.age>85){ s.dead=true; continue; }
    for(const e of enemies) {
      if(e.dead||e.isBall||e.snow>=3) continue;
      if(hits(s,e)) {
        e.snow++;
        e.thawCd = e.snow===1?340:e.snow===2?220:0;
        snowBurst(s.x,s.y,6);
        if(e.snow>=3) freezeEnemy(e);
        s.dead=true; break;
      }
    }
  }
  shots=shots.filter(s=>!s.dead);
}

// ── ITEM LOGIC ─────────────────────────────────
function updateItems() {
  for(const it of items) {
    it.life--; it.tick++;
    if(it.life<=0){ it.dead=true; continue; }
    applyGrav(it); moveY(it);
    it.x+=it.vx; it.vx*=0.92;
    if(it.x<0) it.x=0; if(it.x+it.w>W) it.x=W-it.w;
    if(it.y>H){ it.dead=true; continue; }
    if(!player.dead && hits(player,it)) {
      if(it.k===3){ lives=Math.min(lives+1,9); pops.push(new Pop(it.x,it.y,'1UP!','#ff44ff')); }
      else {
        const v=[200,500,1500][it.k]||200;
        score+=v; if(score>hi) hi=score;
        pops.push(new Pop(it.x,it.y,v+'', it.k===2?'#44eecc':it.k===1?'#ffee44':'#ff8844'));
      }
      sparkBurst(it.x+it.w/2,it.y+it.h/2,['#ff8844','#ffee44','#44eecc','#ff44ff'][it.k]);
      it.dead=true; sfx.item();
    }
  }
  items=items.filter(i=>!i.dead);
}

// ── INIT ───────────────────────────────────────
function initLevel() {
  const ld=LEVELS[lvl%LEVELS.length];
  plats=ld.plats;
  enemies=ld.enemies.map(d=>new Enemy(d));
  shots=[]; items=[]; parts=[]; pops=[]; combo=0;
  if(!player) player=new Player(); else player.spawn();
}

// ── UPDATE ─────────────────────────────────────
function update() {
  frame++;
  if(screenShake>0) screenShake--;
  if(state!=='playing') return;

  updatePlayer();
  updateEnemies();
  updateShots();
  updateItems();
  parts.forEach(p=>p.step()); parts=parts.filter(p=>!p.dead);
  pops.forEach(p=>p.step());   pops=pops.filter(p=>!p.dead);

  if(enemies.length===0 && state==='playing') {
    state='clear'; clearTick=165;
    score+=1000+lives*300;
    sfx.clear();
  }
}

// ── RENDER HELPERS ─────────────────────────────
function drawBg() {
  const ld=LEVELS[lvl%LEVELS.length];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,ld.sky[0]); g.addColorStop(1,ld.sky[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of bgStars) {
    const b=Math.sin(frame*0.04+s.r*10)*0.4+0.6;
    ctx.fillStyle=`rgba(200,220,255,${b*0.28})`;
    ctx.fillRect(s.x,s.y,2,2);
  }

  // Snowflakes drifting
  ctx.fillStyle='rgba(220,240,255,0.18)';
  for(let i=0;i<20;i++) {
    const sx=((i*179)+frame*0.3*(1+i%3*0.2))%W;
    const sy=(frame*0.4*(0.5+i%4*0.25)+i*97)%(H-80)+60;
    ctx.fillRect(sx,sy,2+(i%2),2+(i%2));
  }
}

function drawPlats() {
  const ld=LEVELS[lvl%LEVELS.length];
  for(const p of plats) {
    ctx.fillStyle='#1e2e4e'; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle=ld.accent; ctx.fillRect(p.x,p.y,p.w,3);
    ctx.fillStyle='#c8dcff'; ctx.fillRect(p.x,p.y,p.w,1.5);
    // Left/right edge shadows
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.fillRect(p.x,p.y,2,p.h); ctx.fillRect(p.x+p.w-2,p.y,2,p.h);
  }
}

function drawPlayer() {
  if(player.dead) return;
  if(player.invTimer>0 && frame%5<2) return;
  const {x,y,facing:f}=player;

  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x+PW/2,y+PH+2,PW/2-2,4,0,0,Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle='#d0eaff'; rr(x+2,y+12,PW-4,PH-12,5);
  ctx.fillStyle='rgba(255,255,255,0.4)'; rr(x+3,y+13,6,8,3);

  // Head
  ctx.fillStyle='#e8f6ff'; rr(x+3,y+2,PW-6,14,6);

  // Hat brim
  ctx.fillStyle='#1a44bb'; ctx.fillRect(x+1,y+3,PW-2,4);
  // Hat top
  ctx.fillStyle='#1a44bb'; rr(x+5,y-5,PW-10,10,3);
  // Hat shine
  ctx.fillStyle='rgba(100,150,255,0.3)'; ctx.fillRect(x+6,y-4,4,3);

  // Eye
  ctx.fillStyle='#0d2244';
  ctx.fillRect(f>0?x+PW-9:x+5, y+6, 3,3);

  // Scarf
  ctx.fillStyle='#ee1111'; ctx.fillRect(x+2,y+13,PW-4,4);
  ctx.fillStyle='#cc0000'; ctx.fillRect(x+2,y+15,4,2); // knot

  // Buttons
  ctx.fillStyle='#1a44bb';
  ctx.fillRect(x+PW/2-1,y+20,3,3); ctx.fillRect(x+PW/2-1,y+25,3,3);

  // Feet
  ctx.fillStyle='#88aacc';
  ctx.fillRect(x+3,y+PH-3,7,3); ctx.fillRect(x+PW-10,y+PH-3,7,3);

  ctx.restore();
}

function drawEnemies() {
  for(const e of enemies) {
    if(e.dead) continue;
    const {x,y,t,snow,isBall,kills,wFrame}=e;
    ctx.save();

    if(isBall) {
      const r=EW/2+kills*2.5;
      // Shadow
      ctx.fillStyle='rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(x+EW/2,y+EH+2,r,4,0,0,Math.PI*2); ctx.fill();
      // Ball
      const bg=ctx.createRadialGradient(x+EW/2-r*0.2,y+EH/2-r*0.2,r*0.1,x+EW/2,y+EH/2,r);
      bg.addColorStop(0,'#ddf0ff'); bg.addColorStop(0.7,'#a8cce8'); bg.addColorStop(1,'#7aafdd');
      ctx.fillStyle=bg;
      ctx.beginPath(); ctx.arc(x+EW/2,y+EH/2,r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#5599cc'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(x+EW/2,y+EH/2,r,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(x+EW/2-r*0.28,y+EH/2-r*0.28,r*0.22,0,Math.PI*2); ctx.fill();
      ctx.restore(); continue;
    }

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(x+EW/2,y+EH+1,EW/2,3,0,0,Math.PI*2); ctx.fill();

    // Feet (animated)
    ctx.fillStyle=ECOL[t];
    if(snow===0) {
      ctx.fillRect(wFrame?x+5:x+3, y+EH-5, 6, 5);
      ctx.fillRect(wFrame?x+EW-11:x+EW-9, y+EH-3, 6, 3);
    } else {
      ctx.fillRect(x+4,y+EH-4,6,4); ctx.fillRect(x+EW-10,y+EH-4,6,4);
    }

    // Body
    ctx.fillStyle=ECOL[t]; rr(x+1,y+8,EW-2,EH-8,4);
    // Body shine
    ctx.fillStyle='rgba(255,255,255,0.18)'; rr(x+3,y+10,5,8,3);

    // Head
    ctx.fillStyle=ECOL[t]; rr(x+3,y,EW-6,13,5);

    // Hat brim
    ctx.fillStyle=EHATCOL[t]; ctx.fillRect(x+2,y,EW-4,4);
    // Hat top
    ctx.fillStyle=EHATCOL[t]; rr(x+5,y-5,EW-10,7,3);

    // Eyes
    const ex=e.vx>0?x+EW-9:x+4;
    ctx.fillStyle='#fff'; ctx.fillRect(ex,y+3,5,5);
    ctx.fillStyle=snow>=2?'#88bbff':'#111'; ctx.fillRect(ex+1,y+4,3,3);
    if(snow>=2){ ctx.fillStyle='rgba(150,200,255,0.7)'; ctx.fillRect(ex,y+3,5,5); }

    // Mouth
    ctx.strokeStyle=snow>=1?'#99ccff':'#222'; ctx.lineWidth=1.5;
    ctx.beginPath();
    if(snow>=2){ ctx.moveTo(x+EW/2-3,y+9); ctx.lineTo(x+EW/2+3,y+9); }
    else { ctx.arc(x+EW/2,y+8,3,0.1,Math.PI-0.1); }
    ctx.stroke();

    // Snow overlay
    if(snow===1) {
      ctx.fillStyle='rgba(190,228,255,0.48)';
      ctx.fillRect(x+2,y,EW-4,7);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(x+3,y,4,2);
    } else if(snow===2) {
      ctx.fillStyle='rgba(160,210,255,0.72)'; rr(x+1,y,EW-2,EH,5);
      ctx.fillStyle='rgba(255,255,255,0.2)'; rr(x+3,y+1,6,5,3);
    }

    // Thaw warning flash
    if(snow===3 && !e.isBall && e.thawCd<100 && e.flashTick%12<6) {
      ctx.fillStyle='rgba(255,100,50,0.35)'; rr(x+1,y,EW-2,EH,5);
    }

    ctx.restore();
  }
}

function drawShots() {
  for(const s of shots) {
    ctx.save();
    // Trail
    for(let i=0;i<s.trail.length;i++) {
      const a=(1-i/s.trail.length)*0.4*(1-s.age/85);
      ctx.fillStyle=`rgba(170,220,255,${a})`;
      const r=4-i*0.6;
      ctx.beginPath(); ctx.arc(s.trail[i].x+5,s.trail[i].y+5,r,0,Math.PI*2); ctx.fill();
    }
    // Main
    const a=1-s.age/85;
    ctx.globalAlpha=a;
    ctx.fillStyle='#aadeff';
    ctx.beginPath(); ctx.arc(s.x+5,s.y+5,5.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#eef8ff';
    ctx.beginPath(); ctx.arc(s.x+5,s.y+5,2.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawItems() {
  const KC=['#ff7744','#ffee22','#44eebb','#ff44ff'];
  for(const it of items) {
    const a=it.life<60?it.life/60 : 0.7+Math.sin(it.tick*0.18)*0.3;
    ctx.save(); ctx.globalAlpha=a;
    ctx.fillStyle=KC[it.k];
    // Glow
    ctx.shadowColor=KC[it.k]; ctx.shadowBlur=8;
    switch(it.k) {
      case 0:
        ctx.beginPath(); ctx.arc(it.x+8,it.y+8,7,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.35)';
        ctx.beginPath(); ctx.arc(it.x+5,it.y+5,3,0,Math.PI*2); ctx.fill(); break;
      case 1:
        ctx.save(); ctx.translate(it.x+8,it.y+8); ctx.rotate(Math.PI/4+it.tick*0.04);
        ctx.fillRect(-5,-5,10,10); ctx.restore(); break;
      case 2:
        rr(it.x+3,it.y+2,10,12,4);
        ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillRect(it.x+5,it.y+4,3,5); break;
      case 3:
        ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.fillText('1UP',it.x+8,it.y+12); break;
    }
    ctx.restore();
  }
}

function drawParts() {
  for(const p of parts) {
    ctx.save();
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    ctx.restore();
  }
}

function drawPops() {
  ctx.save();
  ctx.textAlign='center';
  for(const p of pops) {
    ctx.globalAlpha=p.life/70;
    ctx.shadowColor=p.col; ctx.shadowBlur=6;
    ctx.fillStyle=p.col;
    ctx.font=`bold 11px 'Press Start 2P',monospace`;
    ctx.fillText(p.txt,p.x,p.y);
  }
  ctx.restore();
}

function drawHUD() {
  // Top bar
  ctx.fillStyle='rgba(2,5,18,0.75)'; ctx.fillRect(0,0,W,46);
  ctx.strokeStyle='#1e3a5a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,46); ctx.lineTo(W,46); ctx.stroke();

  ctx.font='7px "Press Start 2P",monospace'; ctx.textAlign='left';
  ctx.fillStyle='#4a6a99'; ctx.fillText('SCORE',8,14);
  ctx.fillStyle='#4a6a99'; ctx.fillText('HI',190,14);
  ctx.fillStyle='#4a6a99'; ctx.fillText('STAGE',365,14);

  ctx.font='11px "Press Start 2P",monospace';
  ctx.fillStyle='#c8e0ff'; ctx.fillText(String(score).padStart(8,'0'),8,32);
  ctx.fillStyle='#ffee44'; ctx.fillText(String(hi).padStart(8,'0'),178,32);
  ctx.fillStyle='#c8e0ff'; ctx.fillText(String(lvl+1).padStart(2,'0'),378,32);

  // Lives
  ctx.font='7px "Press Start 2P",monospace'; ctx.textAlign='right';
  ctx.fillStyle='#4a6a99'; ctx.fillText('♥',W-8,14);
  ctx.fillStyle='#ff4466';
  for(let i=0;i<Math.min(lives,8);i++) {
    const hx=W-10-i*14;
    ctx.fillText('♥',hx,32);
  }

  // Enemy counter
  if(state==='playing') {
    ctx.font='7px "Press Start 2P",monospace'; ctx.textAlign='center';
    ctx.fillStyle='#335577';
    ctx.fillText('LEFT:'+enemies.length,W/2,32);
  }
}

function drawTitleScreen() {
  ctx.fillStyle='#040a18'; ctx.fillRect(0,0,W,H);

  // Drifting snow
  for(let i=0;i<35;i++) {
    const sx=((i*173)+frame*0.4*(1+i%4*0.15))%W;
    const sy=(frame*0.55*(0.4+i%5*0.2)+i*93)%H;
    ctx.fillStyle=`rgba(200,230,255,${0.15+Math.sin(i+frame*0.03)*0.1})`;
    ctx.fillRect(sx,sy,2+i%2,2+i%2);
  }

  // Big logo
  ctx.save();
  ctx.textAlign='center';

  // Shadow
  ctx.fillStyle='rgba(30,100,200,0.35)';
  ctx.font='bold 40px "Press Start 2P",monospace';
  ctx.fillText('SNOW',W/2+3,183);
  ctx.fillText('BROS',W/2+3,233);

  const tg=ctx.createLinearGradient(0,145,0,240);
  tg.addColorStop(0,'#c0e8ff'); tg.addColorStop(0.5,'#ffffff'); tg.addColorStop(1,'#80c0ff');
  ctx.fillStyle=tg;
  ctx.shadowColor='#4488ff'; ctx.shadowBlur=22;
  ctx.fillText('SNOW',W/2,180);
  ctx.fillText('BROS',W/2,230);
  ctx.shadowBlur=0;

  // Subtitle
  ctx.fillStyle='#3a5a8a'; ctx.font='6px "Press Start 2P",monospace';
  ctx.fillText('THE ICE BLAST ADVENTURE',W/2,255);

  // Divider
  ctx.strokeStyle='#1a3a6a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,268); ctx.lineTo(W-60,268); ctx.stroke();

  // Controls
  ctx.font='7px "Press Start 2P",monospace';
  const rows=[
    ['ARROWS / WASD', 'MOVE + JUMP'],
    ['Z / X / SHIFT',  'SHOOT SNOW'],
    ['SHOOT x3',       '→ FREEZE ENEMY'],
    ['WALK INTO BALL', '→ KICK IT!'],
    ['CHAIN KILLS',    '→ BONUS POINTS'],
  ];
  rows.forEach(([a,b],i) => {
    ctx.fillStyle='#3a5a88'; ctx.textAlign='right'; ctx.fillText(a,W/2-8,292+i*22);
    ctx.fillStyle='#88aad4'; ctx.textAlign='left';  ctx.fillText(b,W/2+8,292+i*22);
  });

  // Blink
  if(frame%52<30) {
    ctx.fillStyle='#ffee44'; ctx.font='9px "Press Start 2P",monospace'; ctx.textAlign='center';
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=10;
    ctx.fillText('PRESS ENTER OR SPACE',W/2,460);
    ctx.shadowBlur=0;
  }

  ctx.fillStyle='#223355'; ctx.font='6px "Press Start 2P",monospace'; ctx.textAlign='center';
  ctx.fillText('HI SCORE: '+String(hi).padStart(8,'0'),W/2,510);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.textAlign='center';
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=25;
  ctx.fillStyle='#ff2211'; ctx.font='bold 26px "Press Start 2P",monospace';
  ctx.fillText('GAME OVER',W/2,270);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffcc44'; ctx.font='10px "Press Start 2P",monospace';
  ctx.fillText('FINAL SCORE',W/2,316); ctx.fillText(String(score).padStart(8,'0'),W/2,340);
  if(frame%52<30) {
    ctx.fillStyle='#88aacc'; ctx.font='8px "Press Start 2P",monospace';
    ctx.fillText('PRESS ENTER TO RETRY',W/2,390);
  }
  ctx.restore();
}

function drawClearScreen() {
  ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
  const prog=1-(clearTick/165);
  ctx.save(); ctx.textAlign='center';
  ctx.shadowColor='#ffaa00'; ctx.shadowBlur=18;
  ctx.fillStyle='#ffee44'; ctx.font='bold 20px "Press Start 2P",monospace';
  ctx.fillText('STAGE CLEAR!',W/2,285);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaddff'; ctx.font='9px "Press Start 2P",monospace';
  ctx.fillText('+1000 BONUS',W/2,320);
  // Progress bar
  ctx.fillStyle='#1a3a5a'; ctx.fillRect(W/2-80,340,160,8);
  ctx.fillStyle='#44aaff'; ctx.fillRect(W/2-80,340,160*prog,8);
  ctx.restore();
}

// ── MAIN RENDER ────────────────────────────────
function render() {
  // Screen shake
  const sx=screenShake>0?(Math.random()-0.5)*screenShake*2:0;
  const sy=screenShake>0?(Math.random()-0.5)*screenShake*2:0;

  ctx.save();
  if(screenShake>0) ctx.translate(Math.round(sx),Math.round(sy));
  ctx.clearRect(-4,-4,W+8,H+8);

  if(state==='title') { ctx.restore(); drawTitleScreen(); return; }

  drawBg();
  drawPlats();
  drawItems();
  drawEnemies();
  drawShots();
  drawPlayer();
  drawParts();
  drawPops();
  ctx.restore();

  drawHUD();
  if(state==='clear') drawClearScreen();
  if(state==='gameover') drawGameOver();
}

// ── GAME FLOW ──────────────────────────────────
function handleFlow() {
  if(state==='title') {
    if(pressed('Enter')||pressed('Space')) {
      score=0; lives=3; lvl=0; player=null;
      initLevel(); state='playing'; sfx.start();
    }
  }
  if(state==='gameover') {
    if(pressed('Enter')||pressed('Space')) {
      score=0; lives=3; lvl=0; player=null;
      initLevel(); state='playing'; sfx.start();
    }
  }
  if(state==='clear') {
    clearTick--;
    if(clearTick<=0) { lvl++; initLevel(); state='playing'; }
  }
}

// ── MAIN LOOP ──────────────────────────────────
function loop() {
  handleFlow();
  update();
  render();
  Object.assign(prev,keys);
  requestAnimationFrame(loop);
}
loop();
</script>
